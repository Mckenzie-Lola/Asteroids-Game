<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Asteroids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0ff;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            background: #000;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .ui-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border: 2px solid #0ff;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5),
                        inset 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .ui-label {
            font-size: 12px;
            color: #0aa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ui-value {
            font-size: 24px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            font-weight: bold;
        }

        .lives {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .life-icon {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid #0ff;
            filter: drop-shadow(0 0 5px #0ff);
        }

        #menuScreen, #gameOverScreen, #pauseScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 72px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
            margin-bottom: 30px;
            letter-spacing: 8px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
            }
            to {
                text-shadow: 0 0 30px #0ff, 0 0 60px #0ff, 0 0 90px #0ff;
            }
        }

        .menu-content {
            text-align: center;
        }

        .menu-button {
            background: transparent;
            border: 3px solid #0ff;
            color: #0ff;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            pointer-events: auto;
        }

        .menu-button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff, 0 0 50px #0ff;
            transform: scale(1.05);
        }

        .controls {
            margin-top: 40px;
            padding: 20px;
            border: 2px solid #0aa;
            border-radius: 5px;
            background: rgba(0, 100, 100, 0.1);
            max-width: 600px;
        }

        .controls h3 {
            color: #0ff;
            margin-bottom: 15px;
            font-size: 20px;
            text-shadow: 0 0 10px #0ff;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 16px;
        }

        .control-key {
            color: #0ff;
            font-weight: bold;
        }

        .control-desc {
            color: #0aa;
        }

        .game-over-stats {
            margin: 30px 0;
            font-size: 20px;
        }

        .stat-row {
            margin: 10px 0;
            color: #0aa;
        }

        .stat-value {
            color: #0ff;
            font-weight: bold;
            text-shadow: 0 0 10px #0ff;
        }

        .combo-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff0;
            text-shadow: 0 0 20px #ff0, 0 0 40px #ff0;
            font-weight: bold;
            pointer-events: none;
            z-index: 50;
            animation: comboPopup 1s ease-out;
        }

        @keyframes comboPopup {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .powerup-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: none;
            z-index: 10;
        }

        .powerup-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border: 2px solid #f0f;
            border-radius: 5px;
            color: #f0f;
            font-size: 14px;
            text-shadow: 0 0 10px #f0f;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .powerup-timer {
            width: 40px;
            height: 4px;
            background: rgba(255, 0, 255, 0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        .powerup-timer-fill {
            height: 100%;
            background: #f0f;
            box-shadow: 0 0 5px #f0f;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD Overlay -->
        <div class="ui-overlay">
            <div class="ui-panel">
                <div class="ui-label">Score</div>
                <div class="ui-value" id="scoreDisplay">0</div>
            </div>
            <div class="ui-panel">
                <div class="ui-label">High Score</div>
                <div class="ui-value" id="highScoreDisplay">0</div>
            </div>
            <div class="ui-panel">
                <div class="ui-label">Lives</div>
                <div class="lives" id="livesDisplay"></div>
            </div>
        </div>

        <!-- Power-up Indicators -->
        <div class="powerup-indicator" id="powerupIndicator"></div>

        <!-- Menu Screen -->
        <div id="menuScreen">
            <div class="menu-content">
                <h1>NEON ASTEROIDS</h1>
                <button class="menu-button" id="startButton">Start Game</button>
                <div class="controls">
                    <h3>Controls</h3>
                    <div class="control-row">
                        <span class="control-key">← →</span>
                        <span class="control-desc">Rotate Ship</span>
                    </div>
                    <div class="control-row">
                        <span class="control-key">↑</span>
                        <span class="control-desc">Thrust Forward</span>
                    </div>
                    <div class="control-row">
                        <span class="control-key">SPACE</span>
                        <span class="control-desc">Shoot</span>
                    </div>
                    <div class="control-row">
                        <span class="control-key">SHIFT</span>
                        <span class="control-desc">Hyperspace (Risky!)</span>
                    </div>
                    <div class="control-row">
                        <span class="control-key">P</span>
                        <span class="control-desc">Pause</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="hidden">
            <div class="menu-content">
                <h1>GAME OVER</h1>
                <div class="game-over-stats">
                    <div class="stat-row">
                        Final Score: <span class="stat-value" id="finalScore">0</span>
                    </div>
                    <div class="stat-row">
                        High Score: <span class="stat-value" id="finalHighScore">0</span>
                    </div>
                </div>
                <button class="menu-button" id="restartButton">Play Again</button>
                <button class="menu-button" id="menuButton">Main Menu</button>
            </div>
        </div>

        <!-- Pause Screen -->
        <div id="pauseScreen" class="hidden">
            <div class="menu-content">
                <h1>PAUSED</h1>
                <div class="controls">
                    <h3>Press P to Resume</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Scripts -->
    <script src="particles.js"></script>
    <script src="entities.js"></script>
    <script src="game.js"></script>
</body>
</html>
